<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Portfolio - My Projects</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/icomoon.css">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
	
	<style>
		/* Global */
		body {
			background: #F6F1EE;
			font-family: 'Poppins', sans-serif;
			color: #5c5c5c;
			margin: 0;
			padding: 0;
			height: 100vh;
			display: flex;
			overflow: hidden;
		}

		.app-container {
			display: flex;
			width: 100%;
			height: 100%;
		}

		/* Blob Background in Main Content */
		.main-content {
			flex: 1;
			position: relative;
			height: 100vh;
			overflow-y: auto;
			padding: 40px 60px;
			box-sizing: border-box;
		}
        
		.main-content::-webkit-scrollbar {
			width: 8px;
		}
		.main-content::-webkit-scrollbar-thumb {
			background: rgba(92, 92, 92, 0.2);
			border-radius: 10px;
		}

		.blob {
			position: fixed;
			border-radius: 50%;
			filter: blur(80px);
			opacity: 0.5;
			z-index: -1;
			animation: float 12s infinite ease-in-out alternate;
		}
		.blob-1 {
			width: 400px; height: 400px;
			background: #e8b4b8;
			top: -100px; right: -50px;
		}
		.blob-2 {
			width: 500px; height: 500px;
			background: #f3d5b5;
			bottom: -100px; right: 10%;
			animation-delay: -4s;
			animation-duration: 15s;
		}
		.blob-3 {
			width: 300px; height: 300px;
			background: #b8d8d8;
			top: 30%; left: 20%;
			animation-delay: -7s;
		}

		@keyframes float {
			0% { transform: translateY(0) scale(1); }
			100% { transform: translateY(-40px) scale(1.05); }
		}

		/* Header & Back Button */
		.main-header {
			margin-bottom: 30px;
		}
		.back-link {
			display: inline-flex;
			align-items: center;
			color: #5c5c5c;
			font-size: 16px;
			font-weight: 500;
			text-decoration: none;
			transition: all 0.3s ease;
			cursor: pointer;
		}
		.back-link:hover {
			color: #e8b4b8;
			transform: translateX(-5px);
		}

		/* Sidebar Layout */
		.sidebar-container {
			width: 140px;
			min-width: 140px;
			height: 100vh;
			background: #ffffff;
			display: flex;
			flex-direction: column;
			box-shadow: 10px 0 30px rgba(0,0,0,0.03);
			position: relative;
			z-index: 10;
		}

		.sidebar-scroll {
			flex: 1;
			overflow-y: auto;
			ms-overflow-style: none; 
			scrollbar-width: none;
			padding: 20px 0 80px 0;
			position: relative;
		}
		.sidebar-scroll::-webkit-scrollbar {
			display: none;
		}

		.nav-item {
			width: 140px;
			height: 120px;
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
			cursor: pointer;
			background: transparent;
			transition: all 0.3s ease;
		}

		.temp-circle {
			width: 60px;
			height: 60px;
			border-radius: 50%;
			background: #f6f1ee;
			transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
			display: flex;
			align-items: center;
			justify-content: center;
			color: #b8d8d8;
			font-weight: bold;
			font-size: 18px;
		}

		.nav-item:hover .temp-circle {
			transform: scale(1.1);
			background: #f3d5b5;
		}

		/* Active Cutout Logic */
		.nav-item.active {
			background: #F6F1EE;
			border-top-left-radius: 35px;
			border-bottom-left-radius: 35px;
			width: 120px;
			margin-left: 20px;
		}
		.nav-item.active .temp-circle {
			background: #e8b4b8;
			color: #fff;
			transform: scale(1.2);
			box-shadow: 0 10px 20px rgba(232, 180, 184, 0.4);
		}

		.nav-item.active::before {
			content: '';
			position: absolute;
			top: -35px;
			right: 0;
			width: 35px;
			height: 35px;
			border-bottom-right-radius: 35px;
			box-shadow: 15px 15px 0 15px #F6F1EE;
			pointer-events: none;
		}

		.nav-item.active::after {
			content: '';
			position: absolute;
			bottom: -35px;
			right: 0;
			width: 35px;
			height: 35px;
			border-top-right-radius: 35px;
			box-shadow: 15px -15px 0 15px #F6F1EE;
			pointer-events: none;
		}

		/* Scroll Helper */
		.scroll-helper {
			position: absolute;
			bottom: 15px;
			left: 50%;
			transform: translateX(-50%);
			width: 40px;
			height: 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #ffffff;
			border-radius: 50%;
			box-shadow: 0 -10px 30px rgba(255,255,255,0.9), 0 4px 10px rgba(0,0,0,0.05);
			color: #e8b4b8;
			animation: bounce 2s infinite;
			pointer-events: none;
			transition: opacity 0.3s ease;
		}

		@keyframes bounce {
			0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
			40% { transform: translateX(-50%) translateY(-10px); }
			60% { transform: translateX(-50%) translateY(-5px); }
		}

		/* Project Display Area */
		.project-display {
			max-width: 1000px;
			margin: 0 auto;
			opacity: 1;
			transform: translateY(0);
			transition: all 0.4s ease-out;
		}

		.temp-image {
			background: linear-gradient(135deg, rgba(232, 180, 184, 0.2), rgba(243, 213, 181, 0.2));
			display: flex;
			align-items: center;
			justify-content: center;
			color: rgba(92, 92, 92, 0.5);
			font-weight: 500;
			font-size: 18px;
			border-radius: 20px;
			border: 2px dashed rgba(232, 180, 184, 0.4);
		}

		.project-hero {
			width: 100%;
			height: 400px;
			margin-bottom: 40px;
			border-radius: 30px;
		}

		.project-info {
			margin-bottom: 60px;
			background: rgba(255, 255, 255, 0.4);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			padding: 40px;
			border-radius: 30px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.02);
		}

		.project-title {
			font-size: 32px;
			font-weight: 700;
			color: #5c5c5c;
			margin: 0 0 20px 0;
			line-height: 1.2;
		}

		.project-desc {
			font-size: 16px;
			line-height: 1.8;
			color: #777;
			margin: 0;
		}

		.wip-section {
			margin-bottom: 60px;
		}

		.wip-title {
			font-size: 22px;
			font-weight: 600;
			margin: 0 0 20px 0;
			color: #5c5c5c;
		}

		.wip-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 30px;
		}

		.wip-card {
			height: 250px;
			border-radius: 20px;
		}

		/* Responsive */
		@media screen and (max-width: 992px) {
			.wip-grid {
				grid-template-columns: repeat(2, 1fr);
			}
		}

		@media screen and (max-width: 768px) {
			.app-container {
				flex-direction: column;
			}
			.sidebar-container {
				width: 100%;
				height: 100px;
				min-height: 100px;
				flex-direction: row;
				border-radius: 0;
				box-shadow: 0 5px 20px rgba(0,0,0,0.05);
			}
			.sidebar-scroll {
				display: flex;
				flex-direction: row;
				padding: 0 20px;
				align-items: center;
			}
			.nav-item {
				width: 80px;
				height: 100px;
			}
			.nav-item.active {
				margin-left: 0;
				margin-top: 15px;
				background: #F6F1EE;
				border-radius: 0;
				border-top-left-radius: 25px;
				border-top-right-radius: 25px;
				height: 85px;
				width: 96px;
			}
			.nav-item.active::before {
				top: auto; bottom: 0;
				right: auto; left: -25px;
				width: 25px; height: 25px;
				border-radius: 0;
				border-bottom-right-radius: 25px;
				box-shadow: 10px 10px 0 10px #F6F1EE;
			}
			.nav-item.active::after {
				top: auto; bottom: 0;
				right: -25px;
				width: 25px; height: 25px;
				border-radius: 0;
				border-bottom-left-radius: 25px;
				box-shadow: -10px 10px 0 10px #F6F1EE;
			}
			.temp-circle {
				width: 50px; height: 50px;
			}
			.scroll-helper {
				display: none;
			}
			.main-content {
				padding: 30px 20px;
			}
			.project-hero {
				height: 250px;
			}
		}

		@media screen and (max-width: 576px) {
			.wip-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="app-container">
		<!-- Sidebar -->
		<nav class="sidebar-container">
			<div class="sidebar-scroll" id="nav-list">
				<div class="nav-item active" data-index="0">
					<div class="temp-circle">1</div>
				</div>
				<div class="nav-item" data-index="1">
					<div class="temp-circle">2</div>
				</div>
				<div class="nav-item" data-index="2">
					<div class="temp-circle">3</div>
				</div>
				<div class="nav-item" data-index="3">
					<div class="temp-circle">4</div>
				</div>
				<div class="nav-item" data-index="4">
					<div class="temp-circle">5</div>
				</div>
				<div class="nav-item" data-index="5">
					<div class="temp-circle">6</div>
				</div>
				<div class="nav-item" data-index="6">
					<div class="temp-circle">7</div>
				</div>
			</div>
			<div class="scroll-helper" id="scrollHelper">
				<i class="icon-arrow-down"></i>
			</div>
		</nav>

		<!-- Main Content -->
		<main class="main-content" id="mainContent">
			<!-- Background blobs -->
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>
			<div class="blob blob-3"></div>
			
			<header class="main-header">
				<a href="index.html" class="back-link">&lt; Back</a>
			</header>

			<div class="project-display" id="project-display">
				<div class="project-hero temp-image">
					<span>Project Hero Image</span>
				</div>
				
				<div class="project-info">
					<h1 class="project-title">Project Title</h1>
					<p class="project-desc">This is a placeholder description. You can later inject the exact descriptions of each project dynamically via Javascript or by rendering different HTML sections.</p>
				</div>

				<div class="wip-section">
					<h3 class="wip-title">Draft & Work in Progress</h3>
					<div class="wip-grid">
						<div class="wip-card temp-image"><span>Draft Image</span></div>
						<div class="wip-card temp-image"><span>Process Image</span></div>
						<div class="wip-card temp-image"><span>Final Detail</span></div>
					</div>
				</div>
			</div>
		</main>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const navItems = document.querySelectorAll('.nav-item');
			const projectDisplay = document.getElementById('project-display');
			const projectTitle = document.querySelector('.project-title');
			const projectDesc = document.querySelector('.project-desc');
			const mainContent = document.getElementById('mainContent');

			// Temporary Project Data
			const projectsData = [
				{
					title: "Whispering Cats",
					desc: "Whispering Cats is my university final project. This game is designed to support SDG 3 — Good Health & Well-Being by promoting emotional awareness through gentle interaction and storytelling. It is a cozy clicker game designed to help players relax while learning simple mental health insights."
				},
				{
					title: "The Velvet Brew",
					desc: "A branding project for The Velvet Brew. A cozy library cafe that brings together two comforting things — warm drinks and good stories."
				},
				{
					title: "Tales of Reverie",
					desc: "A printed portfolio that blends fantasy illustration with the charm of a vintage book aesthetic. It features elegant typography paired with decorative ornaments and patterns to create a refined look, while maintaining a sense of simplicity to avoid feeling too overwhelming."
				},
				{
					title: "Crayon Shinchan",
					desc: "This project showcases my involvement in the Shinchan Exhibition during my internship, where I contributed to the design of social media content, merchandise, and various venue promotional materials. The work focused on maintaining brand consistency while creating engaging visuals suitable for both digital and physical applications."
				},
				{
					title: "Digimon Adventure",
					desc: "As part of the Digimon Exhibition project, I worked on designing a range of promotional materials including social media content, merchandise items, and on-site visuals. This project required adapting key visuals across different formats while ensuring clarity, consistency, and strong visual impact for event promotion."
				},
				{
					title: "INCUBASE Studio",
					desc: "During my internship at Incubase Studio, I was involved in creating a variety of multimedia design outputs, including social media posts, printed materials, and basic video editing. This experience allowed me to work on real client-based projects, strengthen my design workflow, and adapt content across multiple platforms and formats."
				},
				{
					title: "Art Exhibitions",
					desc: "A comprehensive showcase of my traditional art pieces exhibited during 'Message' and 'A Tribute to Life'. This includes key visuals, painting studies, and sculpture works demonstrating a blend of emotional storytelling and fine arts technique."
				}
			];

			navItems.forEach(item => {
				item.addEventListener('click', () => {
					// Remove active from all
					navItems.forEach(nav => nav.classList.remove('active'));
					// Add active to clicked
					item.classList.add('active');
					
					const idx = item.getAttribute('data-index');
					const data = projectsData[idx];

					// Fade out display
					projectDisplay.style.opacity = 0;
					projectDisplay.style.transform = 'translateY(15px)';
					
					setTimeout(() => {
						// Update Content
						if(data) {
							projectTitle.textContent = data.title;
							projectDesc.textContent = data.desc;
						}
						
						// Fade in display
						projectDisplay.style.opacity = 1;
						projectDisplay.style.transform = 'translateY(0)';
						
						// Scroll to top of main content
						mainContent.scrollTo({ top: 0, behavior: 'smooth' });
					}, 300);
				});
			});

			// Handle scroll down hint visibility
			const sidebarScroll = document.getElementById('nav-list');
			const scrollHelper = document.getElementById('scrollHelper');
			
			if (sidebarScroll && scrollHelper) {
				sidebarScroll.addEventListener('scroll', () => {
					if(sidebarScroll.scrollTop > 20) {
						scrollHelper.style.opacity = '0';
					} else {
						scrollHelper.style.opacity = '1';
					}
				});
			}
		});
	</script>
</body>
</html>
